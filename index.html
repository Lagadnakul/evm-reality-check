          "@type": "Answer",
          "text": "No. Fixing Python syntax errors on a home computer establishes no connection to an EVM. EVMs operate on isolated, proprietary embedded hardware with no network interface — not a general-purpose computer running Python."

        "@type": "Question",
        "name": "Is an EVM connected to the internet or WiFi?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Indian Electronic Voting Machines are completely air-gapped standalone embedded systems with no WiFi, Bluetooth, cellular, or internet connectivity. They cannot be accessed remotely under any circumstances."
        }
      },
      {
        "@type": "Question",
        "name": "What is a VVPAT and how does it work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "VVPAT stands for Voter Verifiable Paper Audit Trail. It is a device attached to the Ballot Unit that prints a paper slip showing the voter's selected candidate. The voter can visually verify this slip for exactly 7 seconds through a transparent window before it drops into a sealed, tamper-proof box — creating an independent physical record separate from the electronic count."
        }
      },
      {
        "@type": "Question",
        "name": "What are the main components of an EVM?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "An EVM has two primary units: (1) the Control Unit, operated by the polling officer to enable exactly one vote at a time, and (2) the Ballot Unit, used by the voter to press their candidate's numbered button. A VVPAT unit is also connected for paper-based vote verification. The vote locks the instant the voter presses a button."
        }
      },
      {
        "@type": "Question",
        "name": "Can someone hack an EVM from home using coding skills?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. An EVM is not a networked computer. It runs proprietary one-time-programmable (OTP) firmware on sealed embedded hardware. No programming language, script, or remote tool has any interface, protocol, or physical channel to communicate with an EVM. The firmware cannot be updated even by the manufacturer after manufacture."
        }
      },
      {
        "@type": "Question",
        "name": "How many security layers does an EVM have?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "EVMs are protected by four independent layers: (1) Physical controls — sealed storage, chain of custody, physical witnesses; (2) Operational procedures — multi-officer sign-off, documented steps, mock polling; (3) Verification mechanisms — VVPAT paper trail with 7-second voter viewing window; (4) Audit processes — random VVPAT audits, cross-candidate observers, formal dispute procedures."
        }
      },
      {
        "@type": "Question",
        "name": "How does an EVM prevent someone from voting multiple times?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "An EVM's Ballot Unit locks the moment a voter presses any candidate button — it cannot be pressed again. The machine only accepts a maximum of 4 votes per minute (rate-limited by hardware). The polling officer must manually activate the Control Unit for each new voter, and must be physically present at the polling station."
        }
      },
      {
        "@type": "Question",
        "name": "Can the EVM firmware be reprogrammed to change votes?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. EVM firmware is burned into One-Time Programmable (OTP) memory chips at the time of manufacture. The code cannot be altered, updated, or overwritten at any point after manufacturing — not even by the manufacturer BEL/ECIL, not by the Election Commission, and not by any external actor."
        }
      }
    ]
  }
